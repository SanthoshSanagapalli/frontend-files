<!doctype html>
<html lang="en">
  <head>
    <title>Grid</title>
    <style>
      div {
        border: 2px dashed orange;
        font-size: 25px;
        font-weight: bold;
      }
      .parent {
        width: 500px;
        height: 500px;
        display: grid;
        grid-template-columns: 2fr 3fr 1fr;
        grid-template-rows: 1fr 3fr 2fr;
        /* gap: 10px; */
        padding: 10px;
      }

      .child1 {
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        background-color: lightgreen;
        text-align: center;
      }
      .child2 {
        grid-column: span 1;
        grid-row: span 1;
      }
      .child8 {
        display: flex;
        justify-content: center;
        align-items: center;
        grid-column: span 2;
        background-color: lightgreen;
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="parent">
      <div class="child1">
        <p>Grid Item</p>
      </div>
      <div class="child2"></div>
      <div class="child3"></div>
      <div class="child4"></div>
      <div class="child5"></div>
      <div class="child6"></div>
      <div class="child7"></div>
      <div class="child8">
        <p>Grid item</p>
      </div>
    </div>
  </body>
</html>
