<!doctype html>
<html>
  <head>
    <title>Box sizing</title>
    <style>
      .box1 {
        background-color: aqua;
        border: 10px solid black;
        height: 200px;
        width: 200px;
        margin: 10px;
        padding: 10px;
      }
      .box2 {
        background-color: aqua;
        border: 10px solid black;
        height: 200px;
        width: 200px;
        margin: 10px;
        padding: 10px;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <div class="box1"></div>
    <div class="box2"></div>
  </body>
</html>
