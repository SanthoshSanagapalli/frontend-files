<!doctype html>
<html>
  <head>
    <!-- Flex basis acts as a width to the elements to give the perfect width to all the elements
      flex-grow:0 flex-shrink:1 and flex-basis:auto: these are the default values of the flex properties 
      the shorthand property is flex:0  1 auto; grow, shink basis-->
    <title>Flex Basis</title>
    <style>
      .parent {
        border: 2px solid black;
        width: 200px;
        height: 100px;
        display: flex;
        gap: 5px;
      }
      .parent > div {
        flex: 0 1 auto;
        color: white;
        height: 100px;
        background-color: blue;
      }
    </style>
  </head>
  <body>
    <div class="parent">
      <div class="child1">One</div>
      <div class="child2">Two</div>
      <div class="child3">Three</div>
    </div>
  </body>
</html>
