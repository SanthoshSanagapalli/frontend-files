<!doctype html>
<html>
  <head>
    <title>Carosoul</title>
    <style>
      .parent {
        width: 600px;
        height: 100px;
        padding: 5px;
        border: 5px solid black;
        overflow: auto;
      }
      .parent::-webkit-scrollbar {
        display: none;
      }
      .group {
        width: 1200px;
        height: 90px;
        gap: 10px;
        display: flex;
        animation: scrollH 10s linear 0s infinite normal;
      }
      .group:hover {
        animation-play-state: paused;
      }
      .group > div:hover {
        transform: scale(1.2);
      }
      .parent > .group > div {
        background-color: aqua;
        flex: 1 0 auto;
      }
      @keyframes scrollH {
        from {
          transform: translateX(0%);
        }
        to {
          transform: translateX(-100%);
        }
      }
    </style>
  </head>
  <body>
    <div class="parent">
      <div class="group">
        <div class="child1"></div>
        <div class="child2"></div>
        <div class="child3"></div>
        <div class="child4"></div>
        <div class="child5"></div>
        <div class="child6"></div>
        <div class="child7"></div>
        <div class="child8"></div>
        <div class="child9"></div>
        <div class="child10"></div>
        <div class="child11"></div>
        <div class="child12"></div>
        <div class="child13"></div>
      </div>
    </div>
  </body>
</html>
