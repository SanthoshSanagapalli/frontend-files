<!doctype html>
<html>
  <head>
    <title>Flex shrink</title>
    <style>
      .parent {
        border: 5px solid black;
        width: 300px;
        height: 100px;
        display: flex;
        gap: 5px;
      }
      .parent > div {
        width: 200px;
        height: 100px;
        background-color: aqua;
      }
      .parent > .child1 {
        flex-shrink: 1;
      }
      .parent > .child2 {
        flex-shrink: 2;
      }
      .parent > .child3 {
        flex-shrink: 3;
      }
    </style>
  </head>
  <body>
    <div class="parent">
      <div class="child1"></div>
      <div class="child2"></div>
      <div class="child3"></div>
    </div>
  </body>
</html>
