<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Listeners</title>
    <style>
      body {
        display: flex;
      }
      .buttons {
        display: flex;
        flex-direction: column;
        width: 120px;
        margin: 10px;
      }
      .buttons > button {
        background-color: aqua;
        margin: 10px;
        padding: 8px;
        border: none;
        cursor: pointer;
        border-radius: 5px;
      }

      .images {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      img {
        width: 500px;
        display: none;
      }
      #butterfly-img {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="buttons">
      <button id="butterfly">Butterfly</button>
      <button id="cat">Cat</button>
      <button id="Eagle">Eagle</button>
      <button id="Parrot">Parrot</button>
      <button id="tiger">Tiger</button>
      <button id="tom">Tom</button>
    </div>

    <div class="images">
      <img
        class="all-imgs"
        id="butterfly-img"
        src="butterfly.avif "
        alt="error"
      />
      <img class="all-imgs" id="cat-img" src="cat.jpg" alt="error" />
      <img class="all-imgs" id="eagle-img" src="eagle.jpeg" alt="error" />
      <img class="all-imgs" id="parrot-img" src="parrot.jpg" alt="error" />
      <img class="all-imgs" id="tiger-img" src="tiger.jpeg" alt="error" />
      <img class="all-imgs" id="tom-img" src="tom.jpeg" alt="error" />
    </div>

    <script>
      let btnButterfly = document.getElementById("butterfly");
      let btnCat = document.getElementById("cat");
      let btnEagle = document.getElementById("Eagle");
      let btnParrot = document.getElementById("Parrot");
      let btntiger = document.getElementById("tiger");
      let btntom = document.getElementById("tom");
      function hideAll() {
        let arr = document.getElementsByClassName("all-imgs");
        for (let i = 0; i < arr.length; i++) {
          arr[i].style.display = "none";
        }
      }
      btnButterfly.addEventListener("click", () => {
        hideAll();
        let img = document.getElementById("butterfly-img");
        img.style.display = "block";
      });

      btnCat.addEventListener("click", () => {
        hideAll();
        let img = document.getElementById("cat-img");
        img.style.display = "block";
      });

      btnEagle.addEventListener("click", () => {
        hideAll();
        let img = document.getElementById("eagle-img");
        img.style.display = "block";
      });

      btnParrot.addEventListener("click", () => {
        hideAll();
        let img = document.getElementById("parrot-img");
        img.style.display = "block";
      });
      btntiger.addEventListener("click", () => {
        hideAll();
        let img = document.getElementById("tiger-img");
        img.style.display = "block";
      });
      btntom.addEventListener("click", () => {
        hideAll();
        let img = document.getElementById("tom-img");
        img.style.display = "block";
      });
    </script>
  </body>
</html>
