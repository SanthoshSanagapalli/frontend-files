<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Media Queries Task</title>

    <style>
      * {
        box-sizing: border-box;
      }
      .content {
        background-color: plum;
        height: 200px;
        width: 100%;
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(4, 1fr);
        padding: 30px;
      }

      @media (max-width: 500px) {
        .content {
          height: 400px;
          display: grid;
          grid-template-columns: repeat(2, 1fr);
        }
      }

      @media (max-width: 300px) {
        .content {
          display: grid;
          height: 400px;
          grid-template-columns: 1fr;
        }
      }

      .content > div {
        background-color: blue;
      }
    </style>
  </head>
  <body>
    <div class="content">
      <div class="card1"></div>
      <div class="card2"></div>
      <div class="card3"></div>
      <div class="card4"></div>
    </div>
  </body>
</html>
