<!doctype html>
<html>
  <head>
    <title>Calculator</title>
    <style>
      * {
        margin: 0px;
        padding: 0px;
      }
      body {
        background: #111;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .calculator {
        width: 300px;
        background: #000;
        padding: 20px;
        border-radius: 20px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
      }
      .display {
        width: 100%;
        height: 60px;
        background: #000;
        color: #fff;
        text-align: right;
        font-size: 32px;
        padding: 10px;
        border-radius: 10px;
        margin-bottom: 20px;
      }
      .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 15px;
      }
      button {
        height: 60px;
        width: 60px;
        border-radius: 50%;
        border: none;
        font-size: 20px;
        cursor: pointer;
        background: #333;
        color: #fff;
        transition: 0.2s;
      }
      button:hover {
        background: #555;
      }
      .function {
        background: #a5a5a5;
        color: #000;
      }
      .operator {
        background: #ff9500;
        color: #fff;
      }
      .zero {
        grid-column: span 2;
        width: 100%;
        border-radius: 30px;
      }
    </style>
  </head>
  <body>
    <div class="calculator">
      <div class="display">0</div>
      <div class="buttons">
        <button class="function">AC</button>
        <button class="function">CE</button>
        <button class="function">%</button>
        <button class="operator">÷</button>

        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button class="operator">×</button>

        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button class="operator">−</button>

        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button class="operator">+</button>

        <button class="zero">0</button>
        <button>.</button>
        <button class="operator">=</button>
      </div>
    </div>
  </body>
</html>
