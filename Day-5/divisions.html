<!doctype html>
<html lang="en">
  <head>
    <title>Divisions</title>
    <style>
      body {
        background-color: aqua;
      }
      .parent1 {
        background-color: red;
        border: 2px solid black;
        padding: 40px;
      }
      .parent2 {
        background-color: pink;
        border: 2px solid black;
        padding: 50px;
        margin-top: 50px;
      }
      .child1 {
        background-color: white;
      }
      .child2 {
        background-color: green;
      }
      .child3 {
        background-color: yellow;
      }
    </style>
  </head>
  <body>
    <div class="parent1">
      <div class="child1">Harish</div>
      <div class="child2">Santhosh</div>
      <div class="child3">Raju</div>
    </div>
    <div class="parent2">Hello</div>
  </body>
</html>
