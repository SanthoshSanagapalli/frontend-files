<html>
  <head>
    <title>Adjacent ,General & psuedo selectors</title>
    <style>
      h3 ~ p {
        color: blue;
      }

      h3 + p {
        color: red;
      }
      a {
        color: red;
        font-size: 40px;
        text-decoration: none;
      }
      a:hover {
        background-color: black;
        color: white;
      }
      a:active {
        color: orange;
      }
      h1:hover {
        background-color: black;
        color: white;
      }
      h1::before {
        content: "🚀";
      }
      h1::after {
        content: "☠️";
      }
    </style>
  </head>
  <body>
    <h3>This is heading</h3>
    <p>This is para 1</p>
    <p>This is para 2</p>

    <p>This is para 3</p>
    <p>This is para 4</p>
    <br />
    <a href="https://www.facebook.com">click Me</a>
    <h1>Santhosh</h1>
    <h1></h1>
    <h1></h1>
    <h1></h1>
    <h1></h1>
    <h1></h1>
  </body>
</html>
