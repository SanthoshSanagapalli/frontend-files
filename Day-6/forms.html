<!doctype html>
<html lang="en">
  <head>
    <style>
      body {
        background-image: linear-gradient(
          to right,
          #ff6a1c,
          #ffda62,
          #ffae56,
          #f5788b
        );
        min-height: 100vh;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      input {
        border: none;
        border-bottom: 2px solid black;
        margin: 10px;
      }

      button {
        background-color: lightblue;
        border: none;
        border-radius: 10px;
        width: 100px;
        height: 40px;
      }
      button:hover {
        background-color: darkblue;
        color: white;
      }
      form {
        display: flex;
        flex-direction: column;
        width: 600px;
        height: 400px;
        background-color: white;
        justify-content: center;
        align-items: center;
        border-radius: 25px;

        /* box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15); */
      }
    </style>
    <title>Forms</title>
  </head>
  <body>
    <form>
      <h2>Fill the form</h2>
      <input
        type="text"
        name="name"
        placeholder="Enter your name"
        required
      /><br />

      <input
        type="email"
        name="email"
        placeholder="Enter your email"
        required
      /><br />
      <button type="submit">Submit</button>
    </form>
  </body>
</html>
