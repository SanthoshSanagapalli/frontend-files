<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0px;
        padding: 0px;
      }
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100vw;
        flex-direction: column;
        gap: 10px;
      }
      /* h1 {
        border: 4px solid black;
        padding: 10px;
      } */
      form {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      input {
        height: 15px;
        padding: 10px;
      }

      button {
        background-color: aqua;
        color: white;
        border: none;
        width: 120px;
        align-self: center;
        font-size: 25px;
        border-radius: 5px;
      }
    </style>
  </head>
  <body>
    <form id="myform">
      <input name="name" id="n" type="text" placeholder="Enter you dashboard" />
      <input
        name="pass"
        id="p"
        type="password"
        placeholder="Enter your password"
      />
      <button type="submit">submit</button>
    </form>
    <h1 id="rn"></h1>
    <h1 id="rp"></h1>
    <script>
      let f = document.getElementById("myform");
      f.addEventListener("submit", (e) => {
        alert("Form submitted successfully");
        e.preventDefault();
        let name = document.getElementById("n");
        let pass = document.getElementById("p");
        let rname = document.getElementById("rn");
        let rpass = document.getElementById("rp");

        rname.innerText = name.value;
        rpass.innerText = pass.value;
      });
    </script>
  </body>
</html>
