<!doctype html>
<html>
  <head>
    <title>Calculator</title>
    <style>
      * {
        margin: 0px;
        padding: 0px;
      }
      body {
        background: #111;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .calculator {
        width: 300px;
        background: #000;
        padding: 20px;
        border-radius: 20px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
      }
      .display {
        width: 100%;
        height: 60px;
        background: #000;
        color: #fff;
        text-align: right;
        font-size: 32px;
        padding: 10px;
        border-radius: 10px;
        margin-bottom: 20px;
      }
      .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 15px;
      }
      button {
        height: 60px;
        width: 60px;
        border-radius: 50%;
        border: none;
        font-size: 20px;
        cursor: pointer;
        background: #333;
        color: #fff;
        transition: 0.2s;
      }
      button:hover {
        background: #555;
      }
      .function {
        background: #a5a5a5;
        color: #000;
      }
      .operator {
        background: #ff9500;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div class="calculator">
      <div class="display" id="res">0</div>
      <div class="buttons">
        <button class="function" onclick="ac()">AC</button>
        <button class="function" onclick="removeLast()">CE</button>
        <button class="function" onclick="enterval('%')">%</button>
        <button class="operator" onclick="enterval('/')">/</button>

        <button onclick="enterval('7')">7</button>
        <button onclick="enterval('8')">8</button>
        <button onclick="enterval('9')">9</button>
        <button class="operator" onclick="enterval('*')">*</button>

        <button onclick="enterval('4')">4</button>
        <button onclick="enterval('5')">5</button>
        <button onclick="enterval('6')">6</button>
        <button class="operator" onclick="enterval('-')">−</button>

        <button onclick="enterval('1')">1</button>
        <button onclick="enterval('2')">2</button>
        <button onclick="enterval('3')">3</button>
        <button class="operator" onclick="enterval('+')">+</button>

        <button onclick="enterval('00')">00</button>
        <button onclick="enterval('0')">0</button>

        <button onclick="enterval('.')">.</button>
        <button class="operator" onclick="calci('=')">=</button>
      </div>
    </div>
    <script>
      function enterval(ch) {
        const output = document.getElementById("res");
        if (output.innerText === "0" && ch !== ".") {
          output.innerText = ch;
        } else {
          output.innerText += ch;
        }
      }

      function calci() {
        const output = document.getElementById("res");
        try {
          const result = eval(output.innerText);
          output.innerText = result;
        } catch (error) {
          output.innerText = "Error";
        }
      }

      function ac() {
        document.getElementById("res").innerText = "0";
      }

      function removeLast() {
        const output = document.getElementById("res");
        const value = output.innerText;
        output.innerText = value.length > 1 ? value.slice(0, -1) : "0";
      }
    </script>
  </body>
</html>
