<!doctype html>
<html>
  <head>
    <title>IFrame Example</title>
  </head>
  <body>
    <h1>IFrame</h1>
    <iframe
      width="560"
      height="315"
      src="https://www.youtube.com/embed/v5jVX0QYwQo?si=q2m-qyppOaS6DR-a"
      title="YouTube video player"
      frameborder="0"
      allow="
        accelerometer;
        autoplay;
        clipboard-write;
        encrypted-media;
        gyroscope;
        picture-in-picture;
        web-share;
      "
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    ></iframe>
    <iframe
      src="sstudentRegistration.html"
      frameborder="1"
      width="500"
      height="500"
    ></iframe>
    <iframe
      width="560"
      height="315"
      src="https://www.youtube.com/embed/CM9pxSpyNjQ?si=kMYbAOEQ6mLo-8WL"
      title="YouTube video player"
      frameborder="0"
      allow="
        accelerometer;
        autoplay;
        clipboard-write;
        encrypted-media;
        gyroscope;
        picture-in-picture;
        web-share;
      "
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    ></iframe>
  </body>
</html>
