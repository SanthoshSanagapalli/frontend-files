<!doctype html>
<html lang="en">
  <head>
    <title>TYPES</title>
  </head>
  <body>
    <form>
      <input type="text" placeholder="Enter your name" /> <br />
      <input type="email" placeholder="Enter your email" /><br />
      <input type="password" placeholder="Enter your password" /><br />
      <input type="search" placeholder="Search" /><br />
      <label for="d">DOB</label>
      <input type="date" placeholder="Enter your date" id="d" /><br />

      <input type="tel" placeholder="Enter your number" /><br />
      <input type="url" placeholder="Enter your linkedin profile" /><br />
      <input type="range" name="r" min="0" max="100" /><br />
      <input type="color" name="c" /><br />
      <input type="week" name="w" /><br />
      <input type="datetime-local" name="y" /><br />
      <input type="file" name="f" /><br />
      <input type="submit" value="Submit" />
      <input type="reset" value="Reset" />
    </form>
  </body>
</html>
