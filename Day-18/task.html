<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Change Colors</title>
  </head>
  <body>
    <script>
      let colors = ["red", "green", "yellow", "blue"];
      let i = 0;
      setInterval(function () {
        document.body.style.backgroundColor = colors[i];
        i++;
        if (i >= colors.length) {
          i = 0;
        }
      }, 1000);
    </script>
  </body>
</html>
